let activeTab = 'all';
let postCounter = 0;

function render() {
  const id = parseInt(new URLSearchParams(location.search).get('id')) || 1;
  const p = profiles[id] || profiles[1];

  document.getElementById('pAvatar').src = p.avatar;
  document.getElementById('pName').textContent = p.name;
  document.getElementById('pRole').textContent = p.role;
  document.getElementById('pExp').textContent = p.exp;
  document.getElementById('pTotal').textContent = p.total;
  document.getElementById('pLive').textContent = p.live;

  // Felt
  document.getElementById('feltGrid').innerHTML = p.felt.map(r =>
    `<div class="felt-item"><span class="felt-badge">${r.e}${r.c}</span><span class="felt-label">${r.l}</span></div>`
  ).join('');

  // Impact
  document.getElementById('impactRow').innerHTML = p.impact.map(i =>
    `<div class="impact-item"><div class="impact-num">${i.n}</div><div class="impact-label">${i.l}</div></div>`
  ).join('');

  // Tech
  document.getElementById('techRow').innerHTML = p.tech.map(t =>
    `<div class="tech-chip"><img src="${t.img}" alt="${t.name}"><span class="tech-name">${t.name}</span></div>`
  ).join('');

  // Featured
  document.getElementById('featuredRow').innerHTML = p.featured.map((f, fi) => {
    const mediaHTML = f.video
      ? `<div class="hmiss-thumb-wrap" onclick="toggleHmissVideo(this)">
           <video class="hmiss-thumb hmiss-video" src="${f.video}" loop muted playsinline style="object-fit:cover;width:100%;border-radius:14px;display:block;"></video>
           <div class="hmiss-play-icon"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M4 2.5L13 8L4 13.5V2.5Z" fill="white"/></svg></div>
         </div>`
      : `<div class="hmiss-thumb-wrap">
           <img class="hmiss-thumb" src="${f.img}" alt="" style="object-fit:cover;">
           <div class="play-btn"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M4 2.5L13 8L4 13.5V2.5Z" fill="white"/></svg></div>
         </div>`;
    return `<div class="hmiss-card" style="background:${f.bg};">
      ${mediaHTML}
      <div class="hmiss-title">${f.title}</div>
      <div class="hmiss-footer">
        <div class="hmiss-stat">${f.s1}</div>
        <div class="hmiss-stat">${f.s2}</div>
      </div>
      <div class="hmiss-divider"></div>
      <div class="hmiss-subtitle">${f.sub}</div>
    </div>`;
  }).join('');

  // Tabs
  const platforms = ['all', ...new Set(p.posts.map(post => post.platform))];
  const tabLabels = { all: 'All' };
  p.posts.forEach(post => { tabLabels[post.platform] = post.platform; });
  document.getElementById('tabsInner').innerHTML = platforms.map(key => {
    const count = key === 'all' ? p.posts.length : p.posts.filter(post => post.platform === key).length;
    return `<div class="ptab${key === activeTab ? ' active' : ''}" onclick="setTab('${key}')">${tabLabels[key]} (${count})</div>`;
  }).join('');

  // Posts
  postCounter = 0;
  const filtered = activeTab === 'all' ? p.posts : p.posts.filter(post => post.platform === activeTab);
  if (!filtered.length) {
    document.getElementById('postsWrap').innerHTML = '<div class="no-posts">No posts in this category yet.</div>';
    return;
  }
  document.getElementById('postsWrap').innerHTML = filtered.map((post, pi) => buildPost(post, pi)).join('');

  // Start video observers
  document.querySelectorAll('.hmiss-video').forEach(v => hmissObserver.observe(v));
  document.querySelectorAll('.post-video').forEach(v => postVideoObserver.observe(v));
}

function buildPost(p, idx) {
  const descId = `pdesc-${idx}`;
  const descHTML = p.longDesc
    ? `<div class="post-desc-container"><div class="post-desc" id="${descId}">${p.desc.replace(/\n/g,'<br>')}</div><span class="read-more-btn" data-expanded="false" onclick="toggleDesc(this)">read more</span></div>`
    : `<div class="post-desc">${p.desc}</div>`;

  const techDots = p.techIcons.map(ic => `<div class="post-tech-dot"><img src="${ic}" alt=""></div>`).join('');
  const statusClass = p.status === 'live' ? 'post-tag-live' : 'post-tag-wip';
  const statusLabel = p.status === 'live' ? 'Live' : 'WIP';

  let mediaHTML = '';
  if (p.media === 'single') {
    const views = p.mediaViews ? `<div class="media-views"><svg width="13" height="13" viewBox="0 0 13 13" fill="none"><circle cx="6.5" cy="6.5" r="5.5" stroke="white" stroke-width="1.2"/><circle cx="6.5" cy="6.5" r="2.2" fill="white"/></svg>${p.mediaViews}</div>` : '';
    mediaHTML = `<div class="post-media-single"><img src="${p.mediaImages[0]}" alt="">${views}</div>`;
  } else if (p.media === 'grid') {
    mediaHTML = `<div class="post-media-5grid">
      <div class="grid5-row"><div class="g5-cell"><img src="${p.mediaImages[0]}" alt=""></div><div class="g5-cell"><img src="${p.mediaImages[1]}" alt=""></div></div>
      <div class="grid5-row"><div class="g5-cell"><img src="${p.mediaImages[2]}" alt=""></div><div class="g5-cell"><img src="${p.mediaImages[3]}" alt=""></div></div>
    </div>`;
  } else if (p.media === 'carousel') {
    mediaHTML = `<div class="post-media-carousel">${p.mediaImages.map(img => `<div class="carousel-item" style="border-radius:0"><img src="${img}" alt=""></div>`).join('')}</div>`;
  } else if (p.media === 'video') {
    const views = p.mediaViews ? `<div class="media-views"><svg width="13" height="13" viewBox="0 0 13 13" fill="none"><circle cx="6.5" cy="6.5" r="5.5" stroke="white" stroke-width="1.2"/><circle cx="6.5" cy="6.5" r="2.2" fill="white"/></svg>${p.mediaViews}</div>` : '';
    mediaHTML = `<div class="post-media-video" style="background:#000;cursor:pointer;" onclick="togglePostVideo(this)">
      <video class="post-video" src="${p.mediaVideo}" loop muted playsinline style="width:100%;height:100%;object-fit:cover;display:block;position:absolute;inset:0;"></video>
      <div class="video-play-btn post-play-overlay"><svg width="22" height="22" viewBox="0 0 22 22" fill="none"><path d="M6 3.5L18 11L6 18.5V3.5Z" fill="white"/></svg></div>
      ${views}
    </div>`;
  }

  const reactionsHTML = p.reactions.map(r =>
    `<div class="reaction-item" onclick="toggleReaction(this)">
       <div class="reaction-emoji-wrap">${r.e}<span class="reaction-count-badge" data-count="${r.c}">+${r.c}</span></div>
       <div class="reaction-label">${r.l}</div>
     </div>`
  ).join('') + `<div class="post-react-vdivider"></div>
    <div class="comment-reaction"><svg width="22" height="22" viewBox="0 0 22 22" fill="none"><path d="M4 4h14a1 1 0 0 1 1 1v9a1 1 0 0 1-1 1H7l-4 3V5a1 1 0 0 1 1-1z" stroke="#293142" stroke-width="1.4" stroke-linejoin="round"/></svg><div class="reaction-label">Comment</div></div>`;

  return `<div class="post-card">
    <div class="post-header" onclick="location.href='profile.html?id=${p.id}'" style="cursor:pointer;">
      <div class="post-avatar" style="padding:0;background:none;"><img src="${p.avatar}" style="width:54px;height:54px;object-fit:cover;border-radius:50%;display:block;" alt=""></div>
      <div class="post-meta">
        <div class="post-name">${p.name}</div>
        <div class="post-role">${p.role}</div>
        <div class="post-subtext">${p.subtext}</div>
      </div>
    </div>
    <div class="post-content">
      <div class="post-title-row"><span class="post-title">${p.title}</span></div>
      ${descHTML}
    </div>
    <div class="post-tech">
      <span class="post-tag ${statusClass}">${statusLabel}</span>
      <span class="post-tag post-tag-type">${p.platform}</span>
      <div class="post-tech-pill">
        <div class="post-tech-icons">${techDots}</div>
        ${p.techCount} tools used <svg width="12" height="8" viewBox="0 0 12 8" fill="none" style="display:inline-block;vertical-align:middle;margin-left:2px"><path d="M1 1L6 6.5L11 1" stroke="#454C5F" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
    </div>
    ${mediaHTML}
    <div class="post-reactions">${reactionsHTML}</div>
    <div style="height:1px;background:#F2F4F7;margin:8px 12px 12px;"></div>
    <div class="post-ctas">
      <button class="post-btn-primary">Visit live site ↗</button>
      <button class="post-btn-outline">View journey 📊</button>
    </div>
  </div>`;
}

function setTab(key) { activeTab = key; render(); }

function toggleReaction(el) {
  const badge = el.querySelector('.reaction-count-badge');
  if (!badge) return;
  const current = parseInt(badge.dataset.count);
  if (el.classList.contains('selected')) {
    el.classList.remove('selected');
    const next = current - 1;
    badge.dataset.count = next;
    badge.textContent = '+' + next;
  } else {
    el.classList.add('selected');
    const next = current + 1;
    badge.dataset.count = next;
    badge.textContent = '+' + next;
  }
}

function toggleDesc(el) {
  const container = el.parentElement;
  const expanded = container.classList.contains('expanded-container');
  container.classList.toggle('expanded-container', !expanded);
  el.textContent = expanded ? 'read more' : 'show less';
  el.dataset.expanded = !expanded;
}

function toggleHmissVideo(wrap) {
  const video = wrap.querySelector('.hmiss-video');
  const icon  = wrap.querySelector('.hmiss-play-icon');
  if (video.paused) { video.play(); if(icon) icon.style.display='none'; }
  else { video.pause(); if(icon) icon.style.display='flex'; }
}

function togglePostVideo(wrap) {
  const video = wrap.querySelector('.post-video');
  const icon  = wrap.querySelector('.post-play-overlay');
  if (video.paused) { video.play(); if(icon) icon.style.display='none'; }
  else { video.pause(); if(icon) icon.style.display='flex'; }
}

const hmissObserver = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    const video = entry.target;
    const icon  = video.closest('.hmiss-thumb-wrap')?.querySelector('.hmiss-play-icon');
    if (entry.isIntersecting) {
      video.play().then(() => { if(icon) icon.style.display='none'; }).catch(()=>{});
    } else {
      video.pause();
      if(icon) icon.style.display='flex';
    }
  });
}, { threshold: 0.5 });

const postVideoObserver = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    const video = entry.target;
    const wrap  = video.closest('.post-media-video');
    const icon  = wrap?.querySelector('.post-play-overlay');
    if (entry.isIntersecting) {
      video.play().then(() => { if(icon) icon.style.display='none'; }).catch(()=>{});
    } else {
      video.pause();
      if(icon) icon.style.display='flex';
    }
  });
}, { threshold: 0.5 });

render();
</script>
